services:
  postgres:
    image: postgres:15
    container_name: flask_auth_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: flask_auth_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: flask_auth_app
    ports:
      - "5000:5000"
    env_file:
      - .env 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "flask db init || true && flask db migrate -m 'migration' || true && flask db upgrade && gunicorn --bind 0.0.0.0:5000 --workers 2 run:app"

volumes:
  postgres_data: